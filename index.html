<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PgIncident</title>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #182142;
      --text: #eef2ff;
      --muted: #a9b3d1;
      --border: rgba(255,255,255,0.08);
      --accent: #6ea8fe;
      --accent-2: #8b5cf6;
      --success: #22c55e;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,0.16), transparent 25%),
        radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 20%),
        var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    textarea, input {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: white;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid var(--border);
    }

    .result-box {
      margin-top: 10px;
      padding: 15px;
      background: #0d1430;
      border-radius: 10px;
      border-left: 3px solid #6ea8fe;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Fix PostgreSQL errors in seconds</h1>
    <p class="subtitle">
      Paste your error or logs and get root cause + commands instantly.
    </p>

    <div class="grid">
      <!-- INPUT -->
      <div class="card">
        <textarea id="error" placeholder="Paste error here..."></textarea>
        <textarea id="logs" placeholder="Paste logs..."></textarea>
        <input id="os" placeholder="OS (optional)" />
        <input id="version" placeholder="Postgres version (optional)" />

        <button class="primary-btn" onclick="analyzeIncident()">Analyze</button>
        <button class="secondary-btn" onclick="loadExample()">Example</button>
        <button class="secondary-btn" onclick="clearForm()">Clear</button>
      </div>

      <!-- OUTPUT -->
      <div class="card">
        <div id="result" class="result-box">
          Your diagnosis will appear here.
        </div>

        <button class="secondary-btn" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <script>
    function loadExample() {
      document.getElementById("error").value =
        'FATAL: no pg_hba.conf entry for host "10.1.2.3"';
      document.getElementById("logs").value =
        'FATAL: no pg_hba.conf entry...';
      document.getElementById("os").value = "RHEL 8";
      document.getElementById("version").value = "15";
    }

    function clearForm() {
      document.getElementById("error").value = "";
      document.getElementById("logs").value = "";
      document.getElementById("os").value = "";
      document.getElementById("version").value = "";
      document.getElementById("result").innerText = "Cleared.";
    }

    function copyResult() {
      const text = document.getElementById("result").innerText;
      navigator.clipboard.writeText(text);
    }

    async function analyzeIncident() {
      const error = document.getElementById("error").value.trim();
      const logs = document.getElementById("logs").value.trim();
      const os = document.getElementById("os").value.trim();
      const version = document.getElementById("version").value.trim();
      const resultEl = document.getElementById("result");

      if (!error) {
        resultEl.innerText = "Please paste error first";
        return;
      }

      resultEl.innerHTML = "⏳ Analyzing...";

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ error, logs, os, version })
        });

        const data = await res.json();
        resultEl.innerText = data.result;
      } catch {
        resultEl.innerText = "Error occurred";
      }
    }
  </script>
</body>
</html>
