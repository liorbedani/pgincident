services:
  - type: web
    name: pgincident
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FREE_ANALYSES_PER_DAY
        value: 5